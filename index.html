<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spotter</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #1c1c1e;
            background: #f2f2f7;
        }
        @media (prefers-color-scheme: dark) {
            body { color: #f2f2f7; background: #000; }
            .card { background: #1c1c1e !important; }
            a.tile { background: #1c1c1e !important; border-color: #38383a !important; }
        }
        .wrap { max-width: 640px; margin: 0 auto; padding: 64px 20px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
        .tagline { color: #8e8e93; font-size: 1.15rem; margin: 0 0 40px; }
        .tiles { display: grid; gap: 16px; }
        a.tile {
            display: block;
            padding: 20px 24px;
            background: #fff;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s ease;
        }
        a.tile:hover { transform: translateY(-2px); }
        a.tile strong { display: block; font-size: 1.1rem; }
        a.tile span { color: #8e8e93; font-size: 0.95rem; }
        footer { margin-top: 48px; color: #8e8e93; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Spotter</h1>
        <p class="tagline">A private, native strength tracker for iPhone and Apple Watch.</p>
        <div class="tiles">
            <a class="tile" href="support.html">
                <strong>Support →</strong>
                <span>Questions, bugs, or feedback</span>
            </a>
            <a class="tile" href="privacy.html">
                <strong>Privacy Policy →</strong>
                <span>How your data stays yours</span>
            </a>
        </div>
        <footer>© 2026 Spotter. Made independently.</footer>
    </div>
</body>
</html>
